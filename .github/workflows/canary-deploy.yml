name: Canary Deploy (EKS)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (tests)
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Run tests
        working-directory: app
        run: pytest -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Install canary-analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "$IMAGE" app
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update kubeconfig
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Apply Kubernetes base (namespace + resources)
        run: kubectl apply -k k8s/overlays/production

      - name: Deploy canary
        env:
          IMAGE: ${{ env.IMAGE }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          chmod +x scripts/*.sh
          scripts/deploy-canary.sh

      - name: Analyze canary metrics
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}
          NAMESPACE: ${{ env.NAMESPACE }}
          CANARY_LABEL: canary
          ANALYSIS_DURATION: "300"
          CHECK_INTERVAL: "30"
        run: scripts/canary-analysis.sh

      - name: Progressive rollout (traffic shift)
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
          STEPS: "5 25 50"
          SLEEP_BETWEEN_STEPS: "30"
        run: scripts/progressive-rollout.sh

      - name: Promote to production
        env:
          IMAGE: ${{ env.IMAGE }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: scripts/promote.sh

      - name: Rollback on failure
        if: failure()
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
        run: scripts/rollback.sh
